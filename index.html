<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算術勇者クエスト ～AIの冒険～</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">
    <!-- タイトル画面 -->
    <div id="title-screen" class="screen active">
      <h1 class="title">算術勇者クエスト</h1>
      <p class="subtitle">～ AI の 冒険 ～</p>
      <div class="title-hero">
        <canvas id="title-canvas" width="64" height="64"></canvas>
      </div>
      <button id="start-btn" class="dq-btn">▶ ぼうけんをはじめる</button>
      <p class="hint">移動: 方向キー / WASD ・ 決定: Enter</p>
    </div>

    <!-- フィールド画面 -->
    <div id="field-screen" class="screen">
      <div class="hud">
        <span id="hud-name">AI</span>
        <span>Lv <b id="hud-lv">1</b></span>
        <span>HP <b id="hud-hp">20</b>/<b id="hud-maxhp">20</b></span>
        <span>EXP <b id="hud-exp">0</b></span>
      </div>
      <canvas id="field-canvas" width="480" height="320"></canvas>
      <p class="hint">草むらを歩くとモンスターが現れる！</p>
      <!-- スマホ用 十字キー -->
      <div id="dpad" class="dpad">
        <button class="dbtn up"    data-dir="up"    aria-label="上">▲</button>
        <button class="dbtn left"  data-dir="left"  aria-label="左">◀</button>
        <button class="dbtn down"  data-dir="down"  aria-label="下">▼</button>
        <button class="dbtn right" data-dir="right" aria-label="右">▶</button>
      </div>
    </div>

    <!-- バトル画面 -->
    <div id="battle-screen" class="screen">
      <canvas id="battle-canvas" width="480" height="200"></canvas>
      <div class="battle-status">
        <div class="status-box">
          <div class="status-line"><span id="b-enemy-name">スライム</span></div>
          <div class="hp-bar"><div id="enemy-hp-fill" class="hp-fill enemy"></div></div>
        </div>
        <div class="status-box">
          <div class="status-line">AI　Lv<span id="b-lv">1</span></div>
          <div class="hp-bar"><div id="hero-hp-fill" class="hp-fill"></div></div>
          <div class="status-line small">HP <span id="b-hp">20</span>/<span id="b-maxhp">20</span></div>
        </div>
      </div>
      <div id="battle-message" class="message-window">モンスターが あらわれた！</div>
      <div id="quiz-area" class="quiz-area">
        <div id="quiz-question" class="quiz-question">2 + 3 = ?</div>
        <input id="quiz-answer" type="text" inputmode="numeric" autocomplete="off" placeholder="こたえ">
        <!-- スマホ用 数字パッド -->
        <div id="keypad" class="keypad">
          <button class="key" data-k="1">1</button>
          <button class="key" data-k="2">2</button>
          <button class="key" data-k="3">3</button>
          <button class="key" data-k="4">4</button>
          <button class="key" data-k="5">5</button>
          <button class="key" data-k="6">6</button>
          <button class="key" data-k="7">7</button>
          <button class="key" data-k="8">8</button>
          <button class="key" data-k="9">9</button>
          <button class="key" data-k="clear">C</button>
          <button class="key" data-k="0">0</button>
          <button class="key" data-k="del">⌫</button>
        </div>
        <button id="quiz-submit" class="dq-btn submit-btn">こうげき！</button>
        <div id="quiz-timer" class="quiz-timer"></div>
      </div>
    </div>

    <!-- ゲームオーバー -->
    <div id="gameover-screen" class="screen">
      <h2 class="gameover-title">ゲームオーバー</h2>
      <p id="gameover-text">AIは ちからつきた…</p>
      <button id="retry-btn" class="dq-btn">▶ もういちど</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
