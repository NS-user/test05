<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびクエスト ～知識の塔～（司法試験サンプル）</title>
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div id="game">
    <!-- タイトル画面 -->
    <div id="title-screen" class="screen active">
      <h1 class="title">まなびクエスト</h1>
      <p class="subtitle">～ 知識の塔 ～</p>
      <div class="title-hero">
        <canvas id="title-canvas" width="64" height="64"></canvas>
      </div>
      <button id="start-btn" class="dq-btn">▲ とうに のぼる</button>
      <p class="hint">科目をえらんで、○×問題で 敵をたおそう！<br>5階ごとに ボスが まちうける…</p>
      <p class="hint">移動: 方向キー / WASD ・ 決定: Enter</p>
      <p class="credit">サンプル科目：司法試験／予備試験（短答）対策</p>
    </div>

    <!-- 科目選択画面 -->
    <div id="subject-screen" class="screen">
      <h2 class="subject-title">かもくを えらぶ</h2>
      <p class="subject-lead">勉強したい科目を タップ！</p>
      <div id="subject-list" class="subject-list"><!-- JSで生成 --></div>
    </div>

    <!-- ダンジョン画面 -->
    <div id="dungeon-screen" class="screen">
      <div class="hud">
        <span>▲<b id="hud-floor">1</b>F</span>
        <span>Lv<b id="hud-lv">1</b></span>
        <span>HP<b id="hud-hp">20</b>/<b id="hud-maxhp">20</b></span>
        <span>📘<b id="hud-subject">-</b></span>
        <span>🔥<b id="hud-combo">0</b></span>
        <span>正答<b id="hud-acc">0</b>%</span>
        <button id="bgm-btn" class="bgm-btn" title="BGM オン/オフ">🔊</button>
      </div>
      <div class="canvas-wrap">
        <canvas id="dungeon-canvas" width="480" height="320"></canvas>
        <div id="toast" class="toast"></div>
      </div>
      <!-- スマホ用 十字キー -->
      <div id="dpad" class="dpad">
        <button class="dbtn up"    data-dir="up"    aria-label="上">▲</button>
        <button class="dbtn left"  data-dir="left"  aria-label="左">◀</button>
        <button class="dbtn down"  data-dir="down"  aria-label="下">▼</button>
        <button class="dbtn right" data-dir="right" aria-label="右">▶</button>
      </div>
      <p class="hint">敵にぶつかると 問題バトル！ ▲は階段 ・ 🧪は回復</p>
    </div>

    <!-- バトル画面 -->
    <div id="battle-screen" class="screen">
      <canvas id="battle-canvas" width="480" height="200"></canvas>
      <div class="battle-status">
        <div class="status-box">
          <div class="status-line"><span id="b-enemy-name">スライム</span></div>
          <div class="hp-bar"><div id="enemy-hp-fill" class="hp-fill enemy"></div></div>
        </div>
        <div class="status-box">
          <div class="status-line">Lv<span id="b-lv">1</span> 🔥<span id="b-combo">0</span></div>
          <div class="hp-bar"><div id="hero-hp-fill" class="hp-fill"></div></div>
          <div class="status-line small">HP <span id="b-hp">20</span>/<span id="b-maxhp">20</span></div>
        </div>
      </div>
      <div id="battle-message" class="message-window">モンスターが あらわれた！</div>
      <div id="quiz-area" class="quiz-area">
        <div id="quiz-subject" class="quiz-subject">憲法</div>
        <div id="quiz-question" class="quiz-question">問題文…</div>
        <!-- ○×回答ボタン -->
        <div id="ox-buttons" class="ox-buttons">
          <button id="btn-o" class="ox-btn ox-o" data-v="1">◯<small>正しい</small></button>
          <button id="btn-x" class="ox-btn ox-x" data-v="0">✕<small>誤り</small></button>
        </div>
        <!-- 解説 -->
        <div id="quiz-explain" class="quiz-explain"></div>
        <button id="quiz-next" class="dq-btn next-btn">つぎへ ▶</button>
        <div id="quiz-timer" class="quiz-timer"></div>
      </div>
    </div>

    <!-- ゲームオーバー -->
    <div id="gameover-screen" class="screen">
      <h2 class="gameover-title">ゲームオーバー</h2>
      <p id="gameover-text">ちからつきた…</p>
      <button id="retry-btn" class="dq-btn">▲ もういちど とうへ</button>
    </div>
  </div>

  <script src="questions.js?v=5"></script>
  <script src="game.js?v=5"></script>
</body>
</html>
